name: listapay
description: Offline-first POS and store management for Philippine retail.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^15.1.2
  drift: ^2.25.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  path: ^1.9.1
  connectivity_plus: ^6.1.4
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  bcrypt: ^1.1.3
  mobile_scanner: ^7.0.1
  pdf: ^3.11.3
  printing: ^5.14.2
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0
  flutter_timezone: ^4.1.0
  http: ^1.6.0
  flutter_secure_storage: ^9.2.4
  supabase_flutter: ^2.9.1
  workmanager: ^0.6.0
  image_picker: ^1.1.2
  device_info_plus: ^11.4.0
  package_info_plus: ^8.3.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  drift_dev: ^2.25.0
  build_runner: ^2.4.15

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/apply_icon.png
  adaptive_icon_background: "#041A2D"
  adaptive_icon_foreground: assets/images/apply_icon.png

flutter_native_splash:
  color: "#F6F8F7"
  image: assets/images/splash_screen_native.png
  android_12:
    color: "#F6F8F7"
    image: assets/images/splash_screen_native.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
